<div style="padding: 20px; font-family: Arial, sans-serif;">
  <h2>Список пользователей</h2>

  <button (click)="loadUsers()" style="margin-bottom: 16px; padding: 8px 16px; cursor: pointer;">
    Обновить
  </button>

  <div *ngIf="isLoading">Загрузка...</div>
  <div *ngIf="error" style="color: red;">{{ error }}</div>

  <table *ngIf="!isLoading && !error" border="1" cellpadding="8" cellspacing="0" style="border-collapse: collapse; width: 100%;">
    <thead style="background-color: #f2f2f2;">
      <tr>
        <th>ID</th>
        <th>Имя</th>
        <th>Фамилия</th>
        <th>Email</th>
        <th>Возраст</th>
        <th>Дата регистрации</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of users">
        <td>{{ user.id }}</td>
        <td>{{ user.name }}</td>
        <td>{{ user.surname }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.age }}</td>
        <td>{{ user.registrationDate | date:'dd.MM.yyyy' }}</td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!isLoading && users.length === 0 && !error">Нет данных</div>
</div>
